name: Rebase & Build Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - personal-tmp  # Only run on personal-tmp branch

jobs:
  rebase-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          ref: personal-tmp
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_config_global: true

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/HeliBorg/HeliBoard.git
          git fetch upstream

      - name: Rebase personal-tmp branch onto upstream/main
        run: git rebase upstream/main

      - name: Force push rebased branch
        run: git push origin personal-tmp --force-with-lease

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release-keystore.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: HeliBoard-release
          path: app/build/outputs/apk/release/*-release.apk

      - name: Clean up keystore
        if: always()
        run: rm -f app/release-keystore.jks

      - name: Archive reports for failed job
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: '*/build/reports'
